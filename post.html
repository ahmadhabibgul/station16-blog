<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading… — Station 16</title>

    <!-- Shared design system -->
    <link rel="stylesheet" href="style.css" />

    <style>
      /* ============================================================
       POST.HTML — Article Reader Styles
       All shared styles live in style.css
    ============================================================ */

      /* ── READING PROGRESS BAR ─────────────────────────────────── */
      #readProgress {
        position: fixed;
        top: 0;
        left: 0;
        width: 0%;
        height: 3px;
        background: var(--orange);
        z-index: var(--z-prog);
        pointer-events: none;
        will-change: width;
        transition: width 0.07s linear;
      }

      /* ── META BAR (back link + breadcrumb) ────────────────────── */
      .meta-bar {
        border-bottom: 1px solid var(--rule);
        background: var(--white);
      }

      .meta-bar-inner {
        display: flex;
        align-items: center;
        height: 46px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: var(--font-sans);
        font-size: 11.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        color: var(--muted);
        flex-shrink: 0;
        white-space: nowrap;
        transition: color var(--fast);
      }
      .back-link:hover {
        color: var(--orange);
      }
      .back-link svg {
        flex-shrink: 0;
        transition: transform var(--fast);
      }
      .back-link:hover svg {
        transform: translateX(-3px);
      }

      .meta-pipe {
        width: 1px;
        height: 16px;
        background: var(--rule);
        margin: 0 16px;
        flex-shrink: 0;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: var(--font-sans);
        font-size: 12px;
        color: var(--faint);
        min-width: 0;
        overflow: hidden;
      }
      .breadcrumb a:hover {
        color: var(--orange);
      }
      .bc-sep {
        color: var(--rule);
        font-size: 16px;
        line-height: 1;
      }
      .bc-cat {
        font-weight: 700;
        color: var(--orange);
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.8px;
        white-space: nowrap;
      }

      /* ── ARTICLE HEADER ───────────────────────────────────────── */
      .article-page {
        padding-bottom: 80px;
        min-height: 75vh;
      }

      .art-header {
        max-width: var(--article);
        margin-inline: auto;
        padding: 48px 22px 34px;
      }

      .art-cat-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2.2px;
        color: var(--orange);
        margin-bottom: 20px;
        transition: opacity var(--fast);
      }
      .art-cat-link:hover {
        opacity: 0.72;
      }

      .cat-dash {
        display: inline-block;
        width: 28px;
        height: 2.5px;
        background: currentColor;
        flex-shrink: 0;
        border-radius: 1px;
      }

      .art-hl {
        font-family: var(--font-display);
        font-size: 46px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.13;
        letter-spacing: -0.7px;
        margin-bottom: 22px;
      }

      .art-deck {
        font-family: var(--font-sans);
        font-size: 19px;
        font-weight: 400;
        line-height: 1.64;
        color: var(--muted);
        font-style: italic;
        padding-left: 18px;
        border-left: 3px solid var(--rule);
        margin-bottom: 26px;
      }

      .art-byline {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        padding: 14px 0;
        border-top: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
      }

      .by-author {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
      }
      .by-dot {
        display: inline-block;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--faint);
        margin: 0 10px;
        flex-shrink: 0;
      }
      .by-date {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 400;
        color: var(--muted);
      }
      .by-read-time {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 400;
        color: var(--faint);
      }

      /* ── HERO IMAGE ───────────────────────────────────────────── */
      .art-hero-outer {
        max-width: var(--content);
        margin-inline: auto;
        padding-inline: 22px;
      }

      .art-hero-img {
        width: 100%;
        overflow: hidden;
        background: var(--surface);
        line-height: 0;
      }
      .art-hero-img img {
        width: 100%;
        max-height: 560px;
        object-fit: cover;
        display: block;
      }

      .art-hero-caption {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding-top: 9px;
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 400;
        color: var(--faint);
        font-style: italic;
        line-height: 1.5;
      }
      .cap-bullet {
        width: 6px;
        height: 6px;
        background: var(--orange);
        flex-shrink: 0;
        margin-top: 4px;
      }

      /* ── ARTICLE BODY LAYOUT (body + sidebar) ─────────────────── */
      .art-wrap {
        display: grid;
        grid-template-columns: 1fr 268px;
        gap: 0 64px;
        max-width: var(--content);
        margin-inline: auto;
        padding-inline: 22px;
        align-items: start;
      }

      /* ── BODY TEXT ────────────────────────────────────────────── */
      .art-body {
        padding-top: 38px;
        max-width: var(--reading);
      }

      .art-body p {
        font-family: var(--font-serif);
        font-size: 19px;
        line-height: 1.84;
        color: var(--body);
        margin-bottom: 28px;
      }

      /* Drop cap — applied via JS to the first <p> */
      .art-body p.p-lead::first-letter {
        font-family: var(--font-display);
        font-size: 82px;
        font-weight: 800;
        float: left;
        line-height: 0.76;
        margin: 6px 10px -6px 0;
        color: var(--ink);
      }

      .art-body h2 {
        font-family: var(--font-display);
        font-size: 27px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.25;
        margin: 48px 0 18px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--rule);
      }

      .art-body h3 {
        font-family: var(--font-sans);
        font-size: 10.5px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2.2px;
        color: var(--muted);
        margin: 40px 0 14px;
      }

      /* Pull quote */
      .art-body blockquote {
        margin: 48px 0;
        padding: 22px 0 22px 28px;
        border-left: 4px solid var(--orange);
      }
      .art-body blockquote p {
        font-family: var(--font-display);
        font-size: 24px;
        font-style: italic;
        color: var(--ink);
        line-height: 1.5;
        margin-bottom: 0;
      }
      .art-body blockquote cite {
        display: block;
        margin-top: 12px;
        font-family: var(--font-sans);
        font-size: 11.5px;
        font-weight: 700;
        font-style: normal;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.9px;
      }

      .art-body hr {
        border: none;
        border-top: 1px solid var(--rule);
        margin: 48px 0;
      }

      /* Inline links within body */
      .art-body a {
        color: var(--ink);
        border-bottom: 1px solid var(--hairline);
        transition:
          color var(--fast),
          border-color var(--fast);
      }
      .art-body a:hover {
        color: var(--orange);
        border-bottom-color: var(--orange);
      }

      /* Lists from markdown */
      .art-body ul,
      .art-body ol {
        padding-left: 24px;
        margin-bottom: 28px;
      }
      .art-body ul {
        list-style: disc;
      }
      .art-body ol {
        list-style: decimal;
      }
      .art-body li {
        font-family: var(--font-serif);
        font-size: 19px;
        line-height: 1.84;
        color: var(--body);
        margin-bottom: 8px;
      }

      /* ── END-OF-ARTICLE ELEMENTS ──────────────────────────────── */
      .art-footer {
        max-width: var(--reading);
        margin-top: 14px;
        padding-top: 28px;
        border-top: 1px solid var(--rule);
      }

      .art-tags {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 22px;
      }
      .tags-label {
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-right: 4px;
      }
      .tag-pill {
        display: inline-block;
        padding: 5px 13px;
        background: var(--surface);
        border: 1px solid var(--rule);
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition:
          background var(--fast),
          border-color var(--fast),
          color var(--fast);
      }
      .tag-pill:hover {
        background: var(--orange);
        border-color: var(--orange);
        color: var(--white);
      }

      .share-bar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .share-label {
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-right: 2px;
      }
      .share-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 16px;
        border: 1.5px solid var(--rule);
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.2px;
        background: none;
        cursor: pointer;
        transition:
          border-color var(--fast),
          color var(--fast);
      }
      .share-btn:hover {
        border-color: var(--orange);
        color: var(--orange);
      }
      .share-btn.btn--copied {
        border-color: #22c55e;
        color: #22c55e;
      }

      /* ── STICKY SIDEBAR ───────────────────────────────────────── */
      .art-sidebar {
        position: sticky;
        top: 74px;
        padding-top: 38px;
        border-left: 1px solid var(--rule);
        padding-left: 28px;
      }

      .sb-head {
        font-family: var(--font-sans);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2.2px;
        color: var(--ink);
        padding-bottom: 10px;
        border-bottom: 2px solid var(--ink);
        margin-bottom: 2px;
      }

      .sb-list li {
        border-bottom: 1px solid var(--rule);
      }
      .sb-item {
        display: block;
        padding: 13px 0;
      }
      .sb-tag {
        font-family: var(--font-sans);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--orange);
        margin-bottom: 5px;
        display: block;
      }
      .sb-title {
        font-family: var(--font-sans);
        font-size: 13.5px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.38;
        margin-bottom: 5px;
        display: block;
        transition: color var(--fast);
      }
      .sb-item:hover .sb-title {
        color: var(--orange);
      }
      .sb-date {
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 400;
        color: var(--faint);
        display: block;
      }

      /* ── RELATED ARTICLES ─────────────────────────────────────── */
      .related-section {
        max-width: var(--content);
        margin: 64px auto 0;
        padding-inline: 22px;
      }

      .related-head {
        display: flex;
        align-items: center;
        gap: 14px;
        border-top: 3px solid var(--ink);
        padding-top: 20px;
        margin-bottom: 28px;
      }
      .related-head-label {
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--ink);
        white-space: nowrap;
      }
      .related-rule {
        flex: 1;
        height: 1px;
        background: var(--rule);
      }

      .related-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }

      .rel-card {
        display: flex;
        flex-direction: column;
        cursor: pointer;
        padding-right: 28px;
        padding-bottom: 28px;
        border-right: 1px solid var(--rule);
      }
      .rel-card:nth-child(n + 2) {
        padding-left: 28px;
      }
      .rel-card:last-child {
        border-right: none;
        padding-right: 0;
      }

      .rel-img-wrap {
        width: 100%;
        aspect-ratio: 16/9;
        overflow: hidden;
        background: var(--surface);
        margin-bottom: 14px;
        line-height: 0;
      }
      .rel-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform var(--slow) ease;
      }
      .rel-card:hover .rel-img-wrap img {
        transform: scale(1.05);
      }

      .rel-cat {
        font-family: var(--font-sans);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.3px;
        color: var(--orange);
        margin-bottom: 7px;
        display: block;
      }
      .rel-title {
        font-family: var(--font-display);
        font-size: 17px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.3;
        margin-bottom: 8px;
        flex: 1;
        transition: color var(--fast);
      }
      .rel-card:hover .rel-title {
        color: var(--orange);
      }
      .rel-summary {
        font-family: var(--font-sans);
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
        margin-bottom: 8px;
      }
      .rel-date {
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 500;
        color: var(--faint);
        text-transform: uppercase;
      }

      /* ── ERROR / NOT FOUND ────────────────────────────────────── */
      .error-state {
        text-align: center;
        padding: 120px 22px;
        max-width: 520px;
        margin-inline: auto;
      }
      .error-state h2 {
        font-family: var(--font-display);
        font-size: 30px;
        color: var(--ink);
        margin-bottom: 14px;
      }
      .error-state p {
        font-family: var(--font-sans);
        font-size: 16px;
        color: var(--muted);
        line-height: 1.65;
        margin-bottom: 32px;
      }
      .btn-home {
        display: inline-block;
        padding: 12px 28px;
        background: var(--orange);
        color: var(--white);
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: opacity var(--fast);
      }
      .btn-home:hover {
        opacity: 0.85;
      }

      /* ── RESPONSIVE ───────────────────────────────────────────── */
      @media (max-width: 1060px) {
        .art-wrap {
          grid-template-columns: 1fr 240px;
          gap: 0 44px;
        }
      }

      @media (max-width: 860px) {
        .art-wrap {
          grid-template-columns: 1fr;
        }
        .art-sidebar {
          display: none;
        }
        .art-hl {
          font-size: 32px;
        }
        .art-deck {
          font-size: 17px;
        }
        .related-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .rel-card:nth-child(2) {
          border-right: none;
          padding-right: 0;
        }
        .rel-card:nth-child(3) {
          grid-column: 1;
          padding-left: 0;
          border-right: none;
        }
        .art-hero-img img {
          max-height: 380px;
        }
      }

      @media (max-width: 600px) {
        .art-hl {
          font-size: 26px;
          letter-spacing: -0.3px;
        }
        .art-deck {
          font-size: 16px;
        }
        .art-body p {
          font-size: 17px;
          line-height: 1.76;
        }
        .art-body blockquote p {
          font-size: 20px;
        }
        .art-body li {
          font-size: 17px;
        }
        .art-hero-img img {
          max-height: 230px;
        }
        .art-header {
          padding: 28px 22px 24px;
        }
        .by-read-time {
          display: none;
        }
        .related-grid {
          grid-template-columns: 1fr;
        }
        .rel-card {
          border-right: none;
          padding-left: 0 !important;
          padding-right: 0 !important;
          border-bottom: 1px solid var(--rule);
          padding-bottom: 24px;
        }
        .rel-card:last-child {
          border-bottom: none;
        }
      }
    </style>
  </head>

     NAVIGATION

    <!-- marked.js — renders Markdown body from the CMS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- ============================================================
     JAVASCRIPT
============================================================ -->
    <script>
      'use strict';

      /* ----------------------------------------------------------------
   CONSTANTS
---------------------------------------------------------------- */
      const CAT_PALETTE = {
        SPORTS: '#0c2744',
        POLITICS: '#3a0e0e',
        TECHNOLOGY: '#0a2112',
        OPINION: '#22103a',
        _DEFAULT: '#1a1a1a',
      };

      const CAT_TAGS = {
        SPORTS: ['Sports', 'Athletics', 'Competition'],
        POLITICS: ['Politics', 'Government', 'Policy'],
        TECHNOLOGY: ['Technology', 'Innovation', 'Science'],
        OPINION: ['Opinion', 'Analysis', 'Editorial'],
        _DEFAULT: ['News', 'Station 16'],
      };

      /* ----------------------------------------------------------------
   UTILITIES
---------------------------------------------------------------- */
      function esc(s) {
        if (s == null) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function makePlaceholder(cat) {
        const bg = CAT_PALETTE[cat] || CAT_PALETTE._DEFAULT;
        const svg =
          `<svg xmlns='http://www.w3.org/2000/svg' width='800' height='450'>` +
          `<rect width='800' height='450' fill='${bg}'/>` +
          `<rect width='3' height='450' fill='#ff8000'/>` +
          `<text x='400' y='232' font-family='Arial,sans-serif' font-size='13' ` +
          `font-weight='700' fill='rgba(255,255,255,0.15)' text-anchor='middle' ` +
          `letter-spacing='5'>${(cat || '').toUpperCase()}</text></svg>`;
        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      }

      function imgTag(src, alt, cat) {
        const ph = makePlaceholder(cat);
        return (
          `<img src="${esc(src)}" alt="${esc(alt)}" ` +
          `onerror="this.onerror=null;this.src='${ph}'">`
        );
      }

      function toNice(cat) {
        if (!cat) return '';
        return cat.charAt(0).toUpperCase() + cat.slice(1).toLowerCase();
      }

      function readingMins(text) {
        const words = (text || '').trim().split(/\s+/).filter(Boolean).length;
        return Math.max(1, Math.round(words / 220));
      }

      /* ----------------------------------------------------------------
   BODY RENDERER
   Uses marked.js to parse Markdown saved by Decap CMS.
   The drop-cap (.p-lead) class is applied via JS after render.
---------------------------------------------------------------- */
      function parseBody(raw) {
        if (!raw) return '<p>No content available.</p>';
        return marked.parse(raw, { gfm: true, breaks: false });
      }

      /* ----------------------------------------------------------------
   READING PROGRESS BAR
---------------------------------------------------------------- */
      const progressEl = document.getElementById('readProgress');

      window.addEventListener(
        'scroll',
        () => {
          const scrolled = window.scrollY;
          const total =
            document.documentElement.scrollHeight - window.innerHeight;
          const pct = total > 0 ? Math.min(100, (scrolled / total) * 100) : 0;
          progressEl.style.width = pct + '%';
          progressEl.setAttribute('aria-valuenow', Math.round(pct));
        },
        { passive: true },
      );

      /* ----------------------------------------------------------------
   HIGHLIGHT NAV LINK FOR CURRENT CATEGORY
---------------------------------------------------------------- */
      function setNavActive(catUpper) {
        document.querySelectorAll('#navLinks a').forEach((a) => {
          const active = a.getAttribute('href')?.includes(`filter=${catUpper}`);
          a.classList.toggle('active', !!active);
        });
      }

      /* ----------------------------------------------------------------
   RENDER ARTICLE
---------------------------------------------------------------- */
      function renderArticle(post, allPosts) {
        const catUp = (post.category || '').toUpperCase();

        const tags = CAT_TAGS[catUp] || CAT_TAGS._DEFAULT;

        /* Page title */
        document.title = `${post.title} — Station 16`;
        setNavActive(catUp);

        /* Breadcrumb + back link */
        const bcCatEl = document.getElementById('bcCat');
        bcCatEl.textContent = catNice;
        bcCatEl.href = `index.html?filter=${catUp}`;

        const backLink = document.getElementById('backLink');
        backLink.href = `index.html?filter=${catUp}`;
        document.getElementById('backLinkText').textContent =
          `Back to ${catNice}`;

        /* Related posts (same category, not self, max 3) */
        const related = allPosts
          .filter((p) => p.category.toUpperCase() === catUp && p.id !== post.id)
          .slice(0, 3);

        /* Sidebar posts (latest overall, not self, max 8) */
        const sideItems = allPosts.filter((p) => p.id !== post.id).slice(0, 8);

        /* ── HTML fragments ── */
        const sidebarHtml = sideItems
          .map(

      <a href="post.html?id=${esc(p.id)}" class="sb-item">

        <time class="sb-date">${esc(p.date)}</time>

    </li>`,
          )
          .join('');

          .map((t) => `<span class="tag-pill">${esc(t)}</span>`)

   RENDER ERROR
---------------------------------------------------------------- */
      function renderError(msg) {

        document.getElementById('mainContent').innerHTML =
          `<div class="error-state">
      <h2>Article Not Found</h2>
      <p>${esc(msg)}</p>
      <a href="index.html" class="btn-home">← Back to Home</a>
    </div>`;
      }

      /* ----------------------------------------------------------------
   INIT
---------------------------------------------------------------- */
      async function init() {
        const postId = new URLSearchParams(location.search).get('id');

        if (!postId) {
          renderError('No article ID was supplied in the URL.');
          return;
        }

        let allPosts;
        try {
          const res = await fetch('posts.json');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          allPosts = await res.json();
        } catch (err) {
          console.warn('Could not load posts.json — using demo data.', err);
          allPosts = DEMO_POSTS;
        }

        const post = allPosts.find((p) => p.id === postId);
        if (!post) {
          renderError(`No article with the ID "${esc(postId)}" was found.`);
          return;
        }

        renderArticle(post, allPosts);
      }
